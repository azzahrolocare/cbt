<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Question Converter</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 800px; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; }
        p.subtitle { text-align: center; color: #666; font-size: 0.9em; margin-bottom: 20px; }
        #output { 
            min-height: 150px; 
            border: 1px solid #dee2e6; 
            padding: 15px; 
            margin-bottom: 10px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            background: #282c34; 
            color: #abb2bf;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            overflow-x: auto;
        }
        textarea { width: 100%; height: 120px; border-radius: 8px; border: 1px solid #ccc; padding: 12px; box-sizing: border-box; font-size: 14px; resize: vertical; }
        .button-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-convert { background: #1a73e8; color: white; }
        .btn-convert:hover { background: #1557b0; }
        .btn-copy { background: #34a853; color: white; }
        .btn-copy:hover { background: #2d8e47; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>JSON Question Converter</h2>
    <p class="subtitle">Tempelkan daftar soal Anda di bawah untuk diubah menjadi format sistem</p>
    
    <div id="output">// Hasil JSON akan muncul di sini...</div>
    
    <textarea id="userInput" placeholder="Contoh: 1. Apa ibukota Indonesia? A. Jakarta B. Bandung..."></textarea>
    
    <div class="button-group">
        <button id="btnKirim" class="btn-convert" onclick="kirimPesan()">Konversi ke JSON</button>
        <button class="btn-copy" onclick="copyResult()">Salin Hasil</button>
    </div>
</div>

<script>
    // Gunakan Backtick ( ` ) agar teks yang memiliki baris baru tidak error
    const SYSTEM_PROMPT = `Instruksi Protokol Data: 
Transformasi Format: Konversikan seluruh teks pertanyaan berikut ke dalam format JSON Array sesuai dengan struktur contoh di bawah ini:
[
  {
    "id": 1,
    "pertanyaan": "Isi pertanyaan di sini",
    "pilihan": ["Opsi A", "Opsi B", "Opsi C", "Opsi D"],
    "jawaban": 0
  }
]
Integritas Teks: Salin seluruh teks soal secara utuh. Dilarang keras memotong, meringkas, atau mengubah redaksi kalimat dalam pertanyaan maupun pilihan jawaban.
Penanganan Visual: Jika terdapat instruksi gambar atau referensi visual pada soal, sertakan tag HTML berikut tepat di bawah teks pertanyaan: <img src='URL' class='img-post'> <br>.
Ketentuan Jawaban: Pastikan indeks "jawaban" merujuk pada posisi yang benar dalam array "pilihan" (dimulai dari angka 0).
Tugas: Ubahlah daftar soal berikut menjadi struktur JSON sesuai protokol di atas:`;

    async function kirimPesan() {
        const apiKey = "AIzaSyDRhhyBIZbGIkydx1CUfF8rDV3DDB2CbUs"; // Gunakan API Key Anda
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        const btn = document.getElementById('btnKirim');

        if (!input) {
            alert("Masukkan teks soal terlebih dahulu!");
            return;
        }

        btn.disabled = true;
        output.innerText = "Sedang memproses data... Mohon tunggu.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `${SYSTEM_PROMPT}\n\nSOAL:\n${input}`
                        }]
                    }],
                    // Menambahkan pengaturan agar AI memberikan response JSON yang bersih
                    generationConfig: {
                        responseMimeType: "application/json"
                    }
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates[0].content.parts[0].text) {
                const hasilAI = data.candidates[0].content.parts[0].text;
                output.innerText = hasilAI;
            } else {
                output.innerText = "Terjadi kesalahan: Respon tidak sesuai format.";
            }
        } catch (error) {
            output.innerText = "Waduh, ada error: " + error;
        } finally {
            btn.disabled = false;
        }
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Hasil berhasil disalin ke clipboard!");
        });
    }
</script>

</body>
</html>
