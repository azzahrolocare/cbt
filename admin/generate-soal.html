<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Custom</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 600px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        #output { min-height: 100px; border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; white-space: pre-wrap; background: #fafafa; }
        textarea { width: 100%; height: 80px; border-radius: 8px; border: 1px solid #ccc; padding: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
        button:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Asisten AI Khusus</h2>
    <div id="output">Halo! Ada yang bisa saya bantu?</div>
    <textarea id="userInput" placeholder="Ketik pesan di sini..."></textarea>
    <button onclick="kirimPesan()">Kirim ke AI</button>
</div>

<script>
    const API_KEY = "AIzaSyDRhhyBIZbGIkydx1CUfF8rDV3DDB2CbUs"; 

    // TENTUKAN PROMPT ANDA DI SINI
    // Contoh: "Kamu adalah guru matematika yang menjelaskan dengan gaya santai."
    const SYSTEM_PROMPT = "Instruksi Protokol Data: Transformasi Format: Konversikan seluruh teks pertanyaan berikut ke dalam format JSON Array sesuai dengan struktur contoh di bawah ini:
      JSON
[
  {
    "id": 1,
    "pertanyaan": "Isi pertanyaan di sini",
    "pilihan": ["Opsi A", "Opsi B", "Opsi C", "Opsi D"],
    "jawaban": 0
  }
]
Integritas Teks: Salin seluruh teks soal secara utuh. Dilarang keras memotong, meringkas, atau mengubah redaksi kalimat dalam pertanyaan maupun pilihan jawaban.
Penanganan Visual: Jika terdapat instruksi gambar atau referensi visual pada soal, sertakan tag HTML berikut tepat di bawah teks pertanyaan: <img src='URL' class='img-post'> <br>.
Ketentuan Jawaban: Pastikan indeks "jawaban" merujuk pada posisi yang benar dalam array "pilihan" (dimulai dari angka 0).
Tugas: Ubahlah daftar soal berikut menjadi struktur JSON sesuai protokol di atas:";

    async function kirimPesan() {
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');

        if (!input) return;

        output.innerText = "Sedang berpikir...";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            // Menggabungkan instruksi Anda dengan input pengguna
                            text: `${SYSTEM_PROMPT}\n\nPengguna bertanya: ${input}`
                        }]
                    }]
                })
            });

            const data = await response.json();
            const hasilAI = data.candidates[0].content.parts[0].text;
            output.innerText = hasilAI;
        } catch (error) {
            output.innerText = "Waduh, ada error: " + error;
        }
    }
</script>

</body>
</html>
