<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Question to JSON Converter</title>
    <style>
        :root {
            --primary-color: #1a73e8;
            --secondary-color: #34a853;
            --bg-color: #f8f9fa;
            --dark-bg: #282c34;
            --text-light: #abb2bf;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
        }

        .container { 
            width: 100%; 
            max-width: 850px; 
            background: white; 
            padding: 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        }

        h2 { color: var(--primary-color); text-align: center; margin-top: 0; }
        p.desc { text-align: center; color: #5f6368; margin-bottom: 25px; font-size: 0.95rem; }

        #output { 
            min-height: 200px; 
            max-height: 400px;
            border: 1px solid #ddd; 
            padding: 15px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            white-space: pre-wrap; 
            background: var(--dark-bg); 
            color: var(--text-light);
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
        }

        textarea { 
            width: 100%; 
            height: 150px; 
            border-radius: 8px; 
            border: 1px solid #ced4da; 
            padding: 15px; 
            box-sizing: border-box; 
            font-size: 14px; 
            resize: vertical;
            outline: none;
            transition: border 0.2s;
        }

        textarea:focus { border: 2px solid var(--primary-color); }

        .btn-group { display: flex; gap: 12px; margin-top: 15px; }

        button { 
            flex: 1; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.3s; 
        }

        .btn-convert { background: var(--primary-color); color: white; }
        .btn-convert:hover { background: #1557b0; transform: translateY(-1px); }
        
        .btn-copy { background: var(--secondary-color); color: white; }
        .btn-copy:hover { background: #2d8e47; transform: translateY(-1px); }

        button:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }

        /* Responsif untuk HP */
        @media (max-width: 600px) {
            .btn-group { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>CBT JSON Generator</h2>
    <p class="desc">Konversi soal teks menjadi format JSON untuk sistem ujian otomatis.</p>
    
    <div id="output">// Hasil JSON akan muncul di sini...</div>
    
    <textarea id="userInput" placeholder="Tempelkan soal Anda di sini...&#10;Contoh:&#10;1. Apa warna langit?&#10;A. Merah&#10;B. Biru..."></textarea>
    
    <div class="btn-group">
        <button id="btnKirim" class="btn-convert" onclick="kirimPesan()">Konversi ke JSON</button>
        <button class="btn-copy" onclick="copyResult()">Salin JSON</button>
    </div>
</div>

<script>
    // Gunakan Backtick ( ` ) untuk instruksi multi-baris agar tidak error
    const SYSTEM_PROMPT = `Instruksi Protokol Data: 
Transformasi Format: Konversikan seluruh teks pertanyaan berikut ke dalam format JSON Array sesuai dengan struktur contoh di bawah ini:
[
  {
    "id": 1,
    "pertanyaan": "Isi pertanyaan di sini",
    "pilihan": ["Opsi A", "Opsi B", "Opsi C", "Opsi D"],
    "jawaban": 0
  }
]
Integritas Teks: Salin seluruh teks soal secara utuh. Dilarang keras memotong, meringkas, atau mengubah redaksi kalimat dalam pertanyaan maupun pilihan jawaban.
Penanganan Visual: Jika terdapat instruksi gambar atau referensi visual pada soal, sertakan tag HTML berikut tepat di bawah teks pertanyaan: <img src='URL' class='img-post'> <br>.
Ketentuan Jawaban: Pastikan indeks "jawaban" merujuk pada posisi yang benar dalam array "pilihan" (dimulai dari angka 0).
Tugas: Ubahlah daftar soal berikut menjadi struktur JSON sesuai protokol di atas:`;

    async function kirimPesan() {
        // API Key Gemini Anda
        const apiKey = "AIzaSyDRhhyBIZbGIkydx1CUfF8rDV3DDB2CbUs"; 
        const input = document.getElementById('userInput').value;
        const output = document.getElementById('output');
        const btn = document.getElementById('btnKirim');

        if (!input.trim()) {
            alert("Harap masukkan teks soal!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Memproses...";
        output.innerText = "// Sedang menyusun JSON... Mohon tunggu.";

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `${SYSTEM_PROMPT}\n\nSOAL:\n${input}`
                        }]
                    }]
                })
            });

            const data = await response.json();
            
            if (data.candidates && data.candidates.length > 0) {
                let hasilAI = data.candidates[0].content.parts[0].text;
                
                // Membersihkan karakter Markdown jika AI menyertakannya
                hasilAI = hasilAI.replace(/```json/g, "").replace(/```/g, "").trim();
                
                output.innerText = hasilAI;
            } else {
                const errorDetail = data.error ? data.error.message : "Gagal mendapatkan respon.";
                output.innerText = "// Terjadi Kesalahan:\n" + errorDetail;
            }
        } catch (error) {
            output.innerText = "// Gagal terhubung ke API:\n" + error.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Konversi ke JSON";
        }
    }

    function copyResult() {
        const text = document.getElementById('output').innerText;
        if (text.startsWith("//")) return;

        navigator.clipboard.writeText(text).then(() => {
            const originalText = document.querySelector('.btn-copy').innerText;
            document.querySelector('.btn-copy').innerText = "Tersalin! ✓";
            setTimeout(() => {
                document.querySelector('.btn-copy').innerText = originalText;
            }, 2000);
        }).catch(err => {
            alert("Gagal menyalin: " + err);
        });
    }
</script>

</body>
</html>
