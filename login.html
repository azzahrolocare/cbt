<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F5132">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <title>Login - CBT Azzahro</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background-color: #f0f2f5; display: flex; flex-direction: column; min-height: 100vh; }
        .top-banner { background: #0F5132; height: 250px; width: 100%; display: flex; justify-content: center; align-items: center; color: white; position: absolute; top: 0; z-index: 1; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .header-content { display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .logo-puspendik { width: 70px; height: auto; cursor: pointer; transition: transform 0.2s; }
        .logo-puspendik:active { transform: scale(0.9); }
        
        .header-text h1 { margin: 0; font-size: 26px; letter-spacing: 2px; font-weight: 900; }
        .header-text p { margin: 0; font-size: 14px; opacity: 0.8; text-align: center; }
        .container { position: relative; z-index: 2; margin-top: 150px; width: 90%; max-width: 400px; background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.15); align-self: center; overflow: hidden; }
        .login-content { padding: 40px 30px; }
        .login-content h2 { margin-top: 0; color: #0F5132; font-size: 22px; text-align: center; font-weight: 800; }
        .subtitle { color: #666; font-size: 13px; text-align: center; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .field-container { display: flex; align-items: center; border: 1.5px solid #dee2e6; border-radius: 10px; background: #fff; transition: 0.3s; }
        .field-container:focus-within { border-color: #3EC381; }
        .field-icon { width: 45px; display: flex; justify-content: center; color: #0F5132; opacity: 0.7; }
        input, select { border: none; outline: none; width: 100%; padding: 14px 10px 14px 0; font-size: 15px; background: transparent; }
        
        .toggle-password { cursor: pointer; padding: 0 15px; display: flex; align-items: center; color: #0F5132; opacity: 0.7; transition: 0.3s; }
        .toggle-password:hover { opacity: 1; }

        .btn-login { background: #0F5132; color: white; width: 100%; border: none; padding: 15px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; min-height: 50px; }
        .btn-login:hover { background: #0d124a; transform: translateY(-2px); }
        
        .dots::after { 
            content: ''; 
            display: inline-block;
            width: 20px;
            text-align: left;
            animation: loading-dots 1.5s infinite; 
        }
        @keyframes loading-dots { 
            0% { content: ''; } 
            25% { content: '.'; } 
            50% { content: '..'; } 
            75% { content: '...'; } 
            100% { content: ''; } 
        }

        .login-footer { background-color: #f8f9fa; padding: 20px; text-align: center; font-size: 11px; color: #999; border-top: 1px solid #eee; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .modal-box { background: white; padding: 35px; border-radius: 15px; max-width: 320px; width: 85%; text-align: center; }
        .icon-circle { width: 60px; height: 60px; border-radius: 50%; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; border: 3px solid currentColor; color: #c62828; }
        .cross-mark { position: relative; width: 30px; height: 30px; }
        .cross-mark::before, .cross-mark::after { content: ''; position: absolute; top: 13px; left: 0; width: 30px; height: 4px; background: currentColor; border-radius: 2px; }
        .cross-mark::before { transform: rotate(45deg); } .cross-mark::after { transform: rotate(-45deg); }
    </style>
</head>
<body>
<div id="customModal" class="modal-overlay">
    <div class="modal-box">
        <div class="icon-circle"><div class="cross-mark"></div></div>
        <h3 id="modalTitle">Login Gagal</h3>
        <p id="modalMessage"></p>
        <button onclick="closeModal()" style="background:#0F5132; color:white; border:none; padding:10px 25px; border-radius:6px; cursor:pointer;">OKE</button>
    </div>
</div>
<div class="top-banner">
    <div class="header-content">
        <img src="https://github.com/masrahmat-id/absensi-barcode-online-smp-smk-azzahro/raw/main/logo-smp-azzahro.png" class="logo-puspendik" onclick="toggleFullScreen()" title="Klik untuk Fullscreen">
        <div class="header-text"><h1>CBT AZ-ZAHRO</h1><p>Asesmen Berbasis Komputer</p></div>
        <img src="https://github.com/masrahmat-id/absensi-barcode-online-smp-smk-azzahro/raw/main/logo-smk-azzahro.png" class="logo-puspendik" onclick="toggleFullScreen()" title="Klik untuk Fullscreen">
    </div>
</div>
<div class="container">
    <div class="login-content">
        <h2>Selamat Datang</h2>
        <p class="subtitle">Silakan login untuk memulai ujian.</p>
        
        <div class="input-group">
            <div class="field-container">
                <span class="field-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg></span>
                <select id="nama" disabled>
                    <option value="" disabled selected hidden>PILIH KELAS TERLEBIH DAHULU</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <div class="field-container">
                <span class="field-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></span>
                <select id="kelas" onchange="getNamaSiswa(this.value)">
                    <option value="" disabled selected hidden>PILIH KELAS</option>
                    <option value="VII">KELAS VII</option>
                    <option value="VIII">KELAS VIII</option>
                    <option value="IX">KELAS IX</option>
                    <option value="X">KELAS X</option>
                    <option value="XI">KELAS XI</option>
                    <option value="XII">KELAS XII</option>
                </select>
            </div>
        </div>
        
        <div class="input-group">
            <div class="field-container">
                <span class="field-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg></span>
                <select id="mapel">
                    <option value="" disabled selected hidden>PILIH MATA PELAJARAN</option>
                </select>
            </div>
        </div>

        <div class="input-group">
            <div class="field-container">
                <span class="field-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg></span>
                <input type="password" id="tokenInput" placeholder="TOKEN UJIAN" autocomplete="off" autocorrect="off">
                <div class="toggle-password" onclick="toggleTokenVisibility()">
                    <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
            </div>
        </div>
        <button class="btn-login" id="btnLogin" onclick="validasiLogin()">MASUK</button>
    </div>
    <div class="login-footer">&copy; 2026 SMP & SMK Az-Zahro - CBT Application System</div>
</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyY528MhAel09tDGjpEeXaGNkzf0BCOc8rUJhoW7-F0c8wQ4alSA1L5KZxLy7uT_OQ6/exec';
    // URL Web App data siswa yang baru diberikan
    const SISWA_URL = 'https://script.google.com/macros/s/AKfycbz3vYiQLbsJFsT1JPyY7pcc2b0GZp2CPoefoYOmthQ0rr5j3sjFQsg50CDxlAyapz3j/exec';
    const ADMIN_TOKEN = 'cbtaz'; 
    
    function toggleTokenVisibility() {
        const tokenInput = document.getElementById('tokenInput');
        const eyeIcon = document.getElementById('eyeIcon');
        
        if (tokenInput.type === 'password') {
            tokenInput.type = 'text';
            eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
        } else {
            tokenInput.type = 'password';
            eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
        }
    }

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            validasiLogin();
        }
    });

    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable full-screen mode: ${err.message}`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    async function loadMapel() {
        try {
            const res = await fetch('mata-pelajaran.json');
            const data = await res.json();
            const selectMapel = document.getElementById('mapel');
            data.forEach(m => {
                let opt = document.createElement('option');
                opt.value = m.file;
                opt.textContent = m.nama;
                selectMapel.appendChild(opt);
            });
        } catch (e) { console.log("Gagal memuat mata-pelajaran.json"); }
    }
    window.addEventListener('DOMContentLoaded', loadMapel);

    // FUNGSI BARU: Mengambil Nama Siswa Otomatis Berdasarkan Kelas yang Dipilih
    async function getNamaSiswa(kelasTerpilih) {
        const namaSelect = document.getElementById('nama');
        namaSelect.disabled = true;
        namaSelect.innerHTML = '<option value="" disabled selected hidden>MEMUAT NAMA SISWA...</option>';
        
        try {
            const response = await fetch(`${SISWA_URL}?action=getSiswa&kelas=${kelasTerpilih}&t=${new Date().getTime()}`);
            const daftarSiswa = await response.json();
            
            namaSelect.innerHTML = '<option value="" disabled selected hidden>PILIH NAMA ANDA</option>';
            
            if (daftarSiswa && daftarSiswa.length > 0) {
                daftarSiswa.forEach(nama => {
                    let opt = document.createElement('option');
                    opt.value = nama.toUpperCase();
                    opt.textContent = nama.toUpperCase();
                    namaSelect.appendChild(opt);
                });
                namaSelect.disabled = false;
            } else {
                namaSelect.innerHTML = '<option value="" disabled selected hidden>TIDAK ADA DATA SISWA</option>';
            }
        } catch (error) {
            console.error(error);
            namaSelect.innerHTML = '<option value="" disabled selected hidden>GAGAL MEMUAT DATA SISWA</option>';
            showNotif("Gagal mengambil data siswa. Silakan periksa koneksi internet.");
        }
    }

    function showNotif(msg) { document.getElementById('modalMessage').innerText = msg; document.getElementById('customModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }
    
    async function validasiLogin() {
        const btn = document.getElementById('btnLogin');
        if(btn.disabled) return;

        const namaSelect = document.getElementById('nama');
        const tokenInputElem = document.getElementById('tokenInput');
        const kelas = document.getElementById('kelas').value;
        const mapelSelect = document.getElementById('mapel');
        const mapelFile = mapelSelect.value;
        const mapelNama = mapelSelect.options[mapelSelect.selectedIndex] ? mapelSelect.options[mapelSelect.selectedIndex].text : "";

        const nama = namaSelect.value;
        const tokenInput = tokenInputElem.value.trim();

        if(!nama || !kelas || !tokenInput || !mapelFile) return showNotif("Lengkapi data login!");

        btn.disabled = true; 
        btn.innerHTML = 'MASUK<span class="dots"></span>';
        
        try {
            const resToken = await fetch(`${SCRIPT_URL}?action=getToken&t=${new Date().getTime()}`);
            const dataToken = await resToken.json();
            
            const isTokenValid = (tokenInput === dataToken.token_aktif) || (tokenInput === ADMIN_TOKEN);

            if(!isTokenValid) {
                btn.disabled = false; 
                btn.innerHTML = 'MASUK';
                tokenInputElem.value = "";
                return showNotif("Token Salah! Gunakan token terbaru dari pengawas.");
            }
            
            // PERUBAHAN DISINI: Menyertakan parameter &mapel agar di-check secara spesifik di Code.gs
            const cekRes = await fetch(`${SCRIPT_URL}?action=checkStatus&nama=${encodeURIComponent(nama)}&kelas=${kelas}&mapel=${encodeURIComponent(mapelNama)}&t=${new Date().getTime()}`);
            const status = await cekRes.text(); 
            
            if (status === "SUDAH_ADA") {
                btn.disabled = false; 
                btn.innerHTML = 'MASUK';
                namaSelect.selectedIndex = 0;
                tokenInputElem.value = "";
                return showNotif("Anda sudah mengerjakan ujian mata pelajaran ini!");
            }
            
            sessionStorage.setItem('Screen1.Has Permission', 'true');
            sessionStorage.setItem('userCBT', JSON.stringify({ 
                nama, 
                kelas, 
                mapel: mapelNama, 
                fileSoal: mapelFile, 
                isAuth: true 
            }));

            namaSelect.selectedIndex = 0;
            tokenInputElem.value = "";

            window.location.href = 'ujian.html';

        } catch (e) { 
            btn.disabled = false; 
            btn.innerHTML = 'MASUK'; 
            showNotif("Gagal koneksi database. Periksa internet Anda."); 
        }
    }
</script>
    
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => {
          console.log('CBT Azzahro: PWA Berhasil didaftarkan');
        })
        .catch(err => {
          console.error('CBT Azzahro: PWA Gagal didaftarkan', err);
        });
    });
  }

  window.history.pushState(null, null, window.location.href);
  window.onpopstate = function () {
    window.history.go(1);
  };
        
  window.addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(e => console.log(e));
    }
  }, { once: true });
</script>
</body>
</html>
